## ~/.aerospace.toml — config inicial

# Inicia junto com o macOS
start-at-login = true

# Normalize layouts (recomendado pelo autor do AeroSpace)
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Layout padrão quando abre uma nova janela
accordion-padding = 30

# Layout principal: tiles (lado a lado). 'accordion' = uma grande, outras espremidas.
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Cursor segue foco automaticamente (ótimo pra multi-monitor)
on-focus-changed = ['move-mouse window-lazy-center']

# Espaço entre janelas (gaps)
[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 0
outer.bottom = 0
outer.top = 0
outer.right = 0

# === Atalhos principais ===
[mode.main.binding]

# Trocar de workspace (alt OU ctrl)
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
ctrl-1 = 'workspace 1'
ctrl-2 = 'workspace 2'
ctrl-3 = 'workspace 3'
ctrl-4 = 'workspace 4'
ctrl-5 = 'workspace 5'
ctrl-6 = 'workspace 6'
ctrl-7 = 'workspace 7'
ctrl-8 = 'workspace 8'
ctrl-9 = 'workspace 9'
alt-tab = 'workspace-back-and-forth'
alt-backtick = 'focus-back-and-forth'          # Alt+` alterna entre as 2 últimas janelas focadas

# Equaliza tamanhos de todas as janelas no container
alt-shift-b = 'balance-sizes'

# Mandar janela pra outro workspace (você FICA)
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# Focar janela vizinha (estilo Vim)
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Mover janela na grade
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize (cobrindo variações de teclado: ABNT2, US)
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# Layouts
alt-slash = 'layout tiles horizontal vertical'   # alterna split horizontal/vertical
alt-comma = 'layout accordion horizontal vertical' # alterna p/ accordion

# Floating <-> Tiling (remove/devolve do gerenciamento do AeroSpace)
alt-shift-space = 'layout floating tiling'
alt-shift-t = 'layout floating tiling'

# Fullscreen
alt-shift-m = 'fullscreen'

# Rotacionar layout (alterna orientação horizontal <-> vertical do container)
# Nota: AeroSpace não tem rotação cíclica entre N janelas.
# Pra 2 janelas isso equivale a uma rotação de 90°.
alt-shift-r = 'layout tiles horizontal vertical'

# Mover workspace pro outro monitor (se tiver 2 monitores)
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Fecha todas as janelas do workspace exceto a focada
alt-shift-backspace = 'close-all-windows-but-current'
